server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass API_URL_PLACEHOLDER/api/;
        proxy_set_header Host $proxy_host;
        proxy_ssl_server_name on;
    }

    location /files/ {
        proxy_pass API_URL_PLACEHOLDER/files/;
        proxy_set_header Host $proxy_host;
        proxy_ssl_server_name on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
