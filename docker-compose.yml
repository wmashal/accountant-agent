services:

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./${GOOGLE_CREDENTIALS_FILE:-accountant-agent-498810-1cbc6f7bf4c0.json}:/secrets/credentials.json:ro
      - receipts_data:/app/receipts

  dashboard:
    build: ./dashboard
    ports:
      - "3001:80"
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: accountant
      POSTGRES_USER: accountant
      POSTGRES_PASSWORD: accountant
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accountant"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  receipts_data:
